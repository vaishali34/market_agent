name: Market Morning Brief

on:
  schedule:
    - cron: '30 3 * * 1-5'  # 9AM IST, Monday to Friday only
  workflow_dispatch:

jobs:
  run-market-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install groq requests

      - name: Run Market Agent
        env:
          GROQ_
